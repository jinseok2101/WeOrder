version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: weorder_db
    environment:
      POSTGRES_USER: weorder
      POSTGRES_PASSWORD: weorder_pass
      POSTGRES_DB: weorder
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U weorder']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
